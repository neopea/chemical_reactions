<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Chemistry Observation Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 650px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            font-size: 1.6em;
        }
        .reactants-box {
            background: #eef2f5;
            padding: 18px;
            border-left: 6px solid #3498db;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 25px;
            border-radius: 4px;
            text-align: center;
        }
        .category-section {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 18px;
        }
        .category-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 5px;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f9fbfd;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.2s, border-color 0.2s;
        }
        .option-label:hover {
            background: #f1f5f9;
        }
        .option-label input {
            margin-right: 10px;
            transform: scale(1.1);
        }
        /* Feedback Styling */
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .missed {
            border: 2px dashed #28a745 !important;
            background-color: #f4fff6 !important;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }
        .btn {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Predict the Observations</h2>
    
    <div class="reactants-box" id="reactants-display">
        </div>
    
    <div class="category-section">
        <div class="category-title">1. Precipitate (with colour) or Dissolving</div>
        <div class="options-grid" id="cat1-container"></div>
    </div>

    <div class="category-section">
        <div class="category-title">2. Solution Colour Change (Select 2 colours if changed)</div>
        <div class="options-grid" id="cat2-container"></div>
    </div>

    <div class="category-section">
        <div class="category-title">3. Gas Bubble / Smell</div>
        <div class="options-grid" id="cat3-container"></div>
    </div>

    <div class="controls">
        <button class="btn" id="submit-btn" onclick="checkAnswers()">Submit Answer</button>
        <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none;">Next Reaction</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    // 5 Template Reactions Structured into your 3 Custom Categories
    const reactions = [
        {
            reactants: "CuCO<sub>3</sub>(s) + H<sub>2</sub>SO<sub>4</sub>(aq)",
            cat1: {
                options: ["Green solid dissolves", "Blue solid dissolves", "White precipitate forms", "No precipitate or dissolving change"],
                correct: ["Green solid dissolves"]
            },
            cat2: {
                options: ["Colorless", "Blue", "Green", "Yellow", "Purple", "No solution colour change"],
                correct: ["Colorless", "Blue"]
            },
            cat3: {
                options: ["Colorless gas bubbles evolved", "Pungent gas evolved", "Brown gas evolved", "No gas or smell observed"],
                correct: ["Colorless gas bubbles evolved"]
            }
        },
        {
            reactants: "FeSO<sub>4</sub>(aq) + KMnO<sub>4</sub>(aq)/H<sup>+</sup>",
            cat1: {
                options: ["Dirty green precipitate forms", "Brown precipitate forms", "No precipitate or dissolving change"],
                correct: ["No precipitate or dissolving change"]
            },
            cat2: {
                options: ["Colorless", "Purple", "Yellow", "Green", "Brown", "No solution colour change"],
                correct: ["Purple", "Colorless"] // Purple KMnO4 decolourizes to colorless/very pale yellow
            },
            cat3: {
                options: ["Colorless gas bubbles evolved", "Pungent gas evolved", "No gas or smell observed"],
                correct: ["No gas or smell observed"]
            }
        },
        {
            reactants: "Cu(s) + 14M HNO<sub>3</sub>(aq)",
            cat1: {
                options: ["Reddish-brown solid dissolves", "Silvery solid dissolves", "No precipitate or dissolving change"],
                correct: ["Reddish-brown solid dissolves"]
            },
            cat2: {
                options: ["Colorless", "Blue", "Green", "Brown", "No solution colour change"],
                correct: ["Colorless", "Blue"]
            },
            cat3: {
                options: ["Colorless gas bubbles evolved", "Pungent gas evolved", "Brown gas evolved", "No gas or smell observed"],
                correct: ["Brown gas evolved", "Pungent gas evolved"] // NO2 is both brown and pungent
            }
        },
        {
            reactants: "Na<sub>2</sub>S<sub>2</sub>O<sub>3</sub>(aq) + HCl(aq)",
            cat1: {
                options: ["Yellow precipitate forms", "White precipitate forms", "No precipitate or dissolving change"],
                correct: ["Yellow precipitate forms"]
            },
            cat2: {
                options: ["Colorless", "Yellow", "Brown", "No solution colour change"],
                correct: ["No solution colour change"]
            },
            cat3: {
                options: ["Colorless gas bubbles evolved", "Pungent gas evolved", "No gas or smell observed"],
                correct: ["Pungent gas evolved"] // SO2 gas is pungent
            }
        },
        {
            reactants: "Mg(s) + HCl(aq)",
            cat1: {
                options: ["Silvery solid dissolves", "White precipitate forms", "No precipitate or dissolving change"],
                correct: ["Silvery solid dissolves"]
            },
            cat2: {
                options: ["Colorless", "Blue", "Yellow", "No solution colour change"],
                correct: ["No solution colour change"]
            },
            cat3: {
                options: ["Colorless gas bubbles evolved", "Pungent gas evolved", "No gas or smell observed"],
                correct: ["Colorless gas bubbles evolved"]
            }
        }
    ];

    let currentQuestionIndex = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderCategory(containerId, catData, catKey) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        
        // Shuffle choices within their category block
        const shuffledOptions = shuffleArray([...catData.options]);

        shuffledOptions.forEach((opt, index) => {
            const label = document.createElement("label");
            label.className = "option-label";
            
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = opt;
            checkbox.dataset.category = catKey;

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(opt));
            container.appendChild(label);
        });
    }

    function loadQuestion() {
        // Clear old feedback and setup buttons
        document.getElementById("feedback").innerText = "";
        document.getElementById("submit-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        
        const q = reactions[currentQuestionIndex];
        document.getElementById("reactants-display").innerHTML = q.reactants;

        // Render all 3 categories cleanly
        renderCategory("cat1-container", q.cat1, "cat1");
        renderCategory("cat2-container", q.cat2, "cat2");
        renderCategory("cat3-container", q.cat3, "cat3");
    }

    function checkAnswers() {
        const q = reactions[currentQuestionIndex];
        const allCheckboxes = document.querySelectorAll(".option-label input");
        let scorePerfect = true;

        allCheckboxes.forEach(checkbox => {
            const label = checkbox.parentElement;
            const categoryKey = checkbox.dataset.category;
            const isChecked = checkbox.checked;
            
            // Reference the correct answers for this specific category
            const correctAnswers = q[categoryKey].correct;
            const isCorrectAnswer = correctAnswers.includes(checkbox.value);

            checkbox.disabled = true; // Lock choices

            if (isChecked) {
                if (isCorrectAnswer) {
                    label.classList.add("correct");
                } else {
                    label.classList.add("incorrect");
                    scorePerfect = false;
                }
            } else {
                if (isCorrectAnswer) {
                    label.classList.add("missed"); // Highlight correct box that was skipped
                    scorePerfect = false;
                }
            }
        });

        // Provide overall result feedback
        const feedbackDiv = document.getElementById("feedback");
        if (scorePerfect) {
            feedbackDiv.innerText = "Excellent! All category observations are completely correct.";
            feedbackDiv.style.color = "#155724";
        } else {
            feedbackDiv.innerText = "Some observations are incorrect or missing. Check the highlighted options.";
            feedbackDiv.style.color = "#721c24";
        }

        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex >= reactions.length) {
            currentQuestionIndex = 0; 
            alert("All template reactions completed. Restarting quiz!");
        }
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
