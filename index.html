<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Chemistry Observation Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 700px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            font-size: 1.6em;
        }
        .reactants-box {
            background: #eef2f5;
            padding: 18px;
            border-left: 6px solid #3498db;
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 25px;
            border-radius: 4px;
            text-align: center;
        }
        .category-section {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 18px;
        }
        .category-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 5px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sub-title {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .color-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f9fbfd;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s, border-color 0.2s;
        }
        .option-label:hover {
            background: #f1f5f9;
        }
        .option-label input {
            margin-right: 8px;
            transform: scale(1.1);
        }
        /* Feedback States */
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .missed {
            border: 2px dashed #28a745 !important;
            background-color: #f4fff6 !important;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }
        .btn {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Predict the Observations</h2>
    
    <div class="reactants-box" id="reactants-display">
        </div>
    
    <div class="category-section">
        <div class="category-title">1. Precipitate or Dissolving State</div>
        <div class="options-grid">
            <label class="option-label"><input type="checkbox" name="cat1" value="Solid dissolves">Solid dissolves</label>
            <label class="option-label"><input type="checkbox" name="cat1" value="White precipitate forms">White precipitate forms</label>
            <label class="option-label"><input type="checkbox" name="cat1" value="Yellow precipitate forms">Yellow precipitate forms</label>
            <label class="option-label"><input type="checkbox" name="cat1" value="Brown precipitate forms">Brown precipitate forms</label>
            <label class="option-label"><input type="checkbox" name="cat1" value="No precipitate or dissolving change">No precipitate or dissolving change</label>
        </div>
    </div>

    <div class="category-section">
        <div class="category-title">2. Solution Colour Change</div>
        
        <div class="sub-title">Initial Colour (Select 1):</div>
        <div class="color-row">
            <label class="option-label"><input type="checkbox" name="cat2-from" value="Colorless">Colorless</label>
            <label class="option-label"><input type="checkbox" name="cat2-from" value="Red">Red</label>
            <label class="option-label"><input type="checkbox" name="cat2-from" value="Green">Green</label>
            <label class="option-label"><input type="checkbox" name="cat2-from" value="Blue">Blue</label>
            <label class="option-label"><input type="checkbox" name="cat2-from" value="Yellow">Yellow</label>
            <label class="option-label"><input type="checkbox" name="cat2-from" value="White">White</label>
            <label class="option-label"><input type="checkbox" name="cat2-from" value="Purple">Purple</label>
        </div>

        <div class="sub-title">Final Colour (Select 1):</div>
        <div class="color-row">
            <label class="option-label"><input type="checkbox" name="cat2-to" value="Colorless">Colorless</label>
            <label class="option-label"><input type="checkbox" name="cat2-to" value="Red">Red</label>
            <label class="option-label"><input type="checkbox" name="cat2-to" value="Green">Green</label>
            <label class="option-label"><input type="checkbox" name="cat2-to" value="Blue">Blue</label>
            <label class="option-label"><input type="checkbox" name="cat2-to" value="Yellow">Yellow</label>
            <label class="option-label"><input type="checkbox" name="cat2-to" value="White">White</label>
            <label class="option-label"><input type="checkbox" name="cat2-to" value="Purple">Purple</label>
        </div>

        <label class="option-label" style="width: fit-content; margin-top: 5px;">
            <input type="checkbox" name="cat2-none" value="No solution colour change">No solution colour change
        </label>
    </div>

    <div class="category-section">
        <div class="category-title">3. Gas Bubble / Smell</div>
        <div class="options-grid">
            <label class="option-label"><input type="checkbox" name="cat3" value="Colorless gas bubbles">Colorless gas bubbles</label>
            <label class="option-label"><input type="checkbox" name="cat3" value="Brown gas evolved">Brown gas evolved</label>
            <label class="option-label"><input type="checkbox" name="cat3" value="Pungent smell">Pungent smell</label>
            <label class="option-label"><input type="checkbox" name="cat3" value="No gas or smell">No gas or smell</label>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="submit-btn" onclick="checkAnswers()">Submit Answer</button>
        <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none;">Next Reaction</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    // Clean JSON Structure: Storing explicit observation metadata targets only.
    const reactions = [
        {
            reactants: "CuCO<sub>3</sub>(s) + H<sub>2</sub>SO<sub>4</sub>(aq)",
            ppt: ["Solid dissolves"],
            colorFrom: "Colorless",
            colorTo: "Blue",
            noColorChange: false,
            gas: ["Colorless gas bubbles"]
        },
        {
            reactants: "FeSO<sub>4</sub>(aq) + KMnO<sub>4</sub>(aq)/H<sup>+</sup>",
            ppt: ["No precipitate or dissolving change"],
            colorFrom: "Purple",
            colorTo: "Colorless", // Purple decolourizes to colorless
            noColorChange: false,
            gas: ["No gas or smell"]
        },
        {
            reactants: "Cu(s) + 14M HNO<sub>3</sub>(aq)",
            ppt: ["Solid dissolves"],
            colorFrom: "Colorless",
            colorTo: "Blue",
            noColorChange: false,
            gas: ["Brown gas evolved", "Pungent smell"] // NO2 is both brown and pungent
        },
        {
            reactants: "Na<sub>2</sub>S<sub>2</sub>O<sub>3</sub>(aq) + HCl(aq)",
            ppt: ["Yellow precipitate forms"],
            colorFrom: "",
            colorTo: "",
            noColorChange: true,
            gas: ["Pungent smell"] // SO2 gas is pungent
        },
        {
            reactants: "Mg(s) + HCl(aq)",
            ppt: ["Solid dissolves"],
            colorFrom: "",
            colorTo: "",
            noColorChange: true,
            gas: ["Colorless gas bubbles"]
        }
    ];

    let currentQuestionIndex = 0;

    function loadQuestion() {
        // Reset Feedback UI
        document.getElementById("feedback").innerText = "";
        document.getElementById("submit-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        
        // Load target formulas
        const q = reactions[currentQuestionIndex];
        document.getElementById("reactants-display").innerHTML = q.reactants;

        // Reset and clear all checkboxes
        const allCheckboxes = document.querySelectorAll(".quiz-container input[type='checkbox']");
        allCheckboxes.forEach(cb => {
            cb.checked = false;
            cb.disabled = false;
            cb.parentElement.className = "option-label"; // clear style states
        });
    }

    function evaluateGroup(checkboxes, correctValues) {
        let perfect = true;
        checkboxes.forEach(cb => {
            const label = cb.parentElement;
            const isChecked = cb.checked;
            const isCorrect = correctValues.includes(cb.value);
            cb.disabled = true;

            if (isChecked) {
                if (isCorrect) {
                    label.classList.add("correct");
                } else {
                    label.classList.add("incorrect");
                    perfect = false;
                }
            } else {
                if (isCorrect) {
                    label.classList.add("missed");
                    perfect = false;
                }
            }
        });
        return perfect;
    }

    function checkAnswers() {
        const q = reactions[currentQuestionIndex];
        
        // Grab form control groups
        const cat1CBs = document.querySelectorAll("input[name='cat1']");
        const cat2FromCBs = document.querySelectorAll("input[name='cat2-from']");
        const cat2ToCBs = document.querySelectorAll("input[name='cat2-to']");
        const cat2NoneCBs = document.querySelectorAll("input[name='cat2-none']");
        const cat3CBs = document.querySelectorAll("input[name='cat3']");

        // Compute accuracy states against structured metadata target conditions
        const p1 = evaluateGroup(cat1CBs, q.ppt);
        
        const p2_from = evaluateGroup(cat2FromCBs, q.noColorChange ? [] : [q.colorFrom]);
        const p2_to = evaluateGroup(cat2ToCBs, q.noColorChange ? [] : [q.colorTo]);
        const p2_none = evaluateGroup(cat2NoneCBs, q.noColorChange ? ["No solution colour change"] : []);
        
        const p3 = evaluateGroup(cat3CBs, q.gas);

        const isEverythingCorrect = p1 && p2_from && p2_to && p2_none && p3;

        // Provide Feedback
        const feedbackDiv = document.getElementById("feedback");
        if (isEverythingCorrect) {
            feedbackDiv.innerText = "Excellent! All observations are completely accurate.";
            feedbackDiv.style.color = "#155724";
        } else {
            feedbackDiv.innerText = "Incorrect or incomplete selections. Review the changes highlighted below.";
            feedbackDiv.style.color = "#721c24";
        }

        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex >= reactions.length) {
            currentQuestionIndex = 0; 
            alert("All template reactions completed. Restarting quiz pool!");
        }
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
