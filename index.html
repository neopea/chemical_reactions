<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Chemistry Observation Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .reactants-box {
            background: #eef2f5;
            padding: 15px;
            border-left: 5px solid #3498db;
            font-size: 1.2em;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-label:hover {
            background: #f1f1f1;
        }
        .option-label input {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .missed {
            border: 2px dashed #28a745 !important;
        }
        .btn {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Predict the Observations</h2>
    <div class="reactants-box" id="reactants-display">
        </div>
    
    <div class="options-container" id="options-container">
        </div>

    <div class="controls">
        <button class="btn" id="submit-btn" onclick="checkAnswers()">Submit Answer</button>
        <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none;">Next Reaction</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    // The 5 Reaction Template Database
    // Using HTML <sub> tags to format chemical formulas correctly on the web page.
    const reactions = [
        {
            reactants: "CuCO<sub>3</sub>(s) + H<sub>2</sub>SO<sub>4</sub>(aq)",
            options: [
                "Green solid dissolves",
                "Colorless gas bubbles evolved",
                "Solution turns blue",
                "White precipitate forms",
                "Pungent gas evolved"
            ],
            correctAnswers: [
                "Green solid dissolves",
                "Colorless gas bubbles evolved",
                "Solution turns blue"
            ]
        },
        {
            reactants: "FeSO<sub>4</sub>(aq) + KMnO<sub>4</sub>(aq)/H<sup>+</sup>",
            options: [
                "Purple solution turns colorless",
                "Solution turns pale yellow",
                "Green precipitate forms",
                "Brown gas evolved"
            ],
            correctAnswers: [
                "Purple solution turns colorless",
                "Solution turns pale yellow"
            ]
        },
        {
            reactants: "Cu(s) + 14M HNO<sub>3</sub>(aq)",
            options: [
                "Reddish-brown solid dissolves",
                "Brown gas evolved",
                "Solution turns blue",
                "Colorless gas bubbles evolved",
                "White solid dissolves"
            ],
            correctAnswers: [
                "Reddish-brown solid dissolves",
                "Brown gas evolved",
                "Solution turns blue"
            ]
        },
        {
            reactants: "Na<sub>2</sub>S<sub>2</sub>O<sub>3</sub>(aq) + HCl(aq)",
            options: [
                "Yellow precipitate forms",
                "Pungent gas evolved",
                "Solution turns brown",
                "Green solid dissolves"
            ],
            correctAnswers: [
                "Yellow precipitate forms",
                "Pungent gas evolved"
            ]
        },
        {
            reactants: "Mg(s) + HCl(aq)",
            options: [
                "Silvery solid dissolves",
                "Colorless gas bubbles evolved",
                "Solution turns yellow",
                "White precipitate forms"
            ],
            correctAnswers: [
                "Silvery solid dissolves",
                "Colorless gas bubbles evolved"
            ]
        }
    ];

    let currentQuestionIndex = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function loadQuestion() {
        // Reset UI
        document.getElementById("feedback").innerText = "";
        document.getElementById("submit-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("submit-btn").disabled = false;
        
        const q = reactions[currentQuestionIndex];
        document.getElementById("reactants-display").innerHTML = q.reactants;

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        // Shuffle options so they aren't in the same order every time
        const shuffledOptions = shuffleArray([...q.options]);

        shuffledOptions.forEach((opt, index) => {
            const label = document.createElement("label");
            label.className = "option-label";
            label.id = "label-" + index;

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = opt;
            checkbox.id = "checkbox-" + index;

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(opt));
            optionsContainer.appendChild(label);
        });
    }

    function checkAnswers() {
        const q = reactions[currentQuestionIndex];
        const optionsContainer = document.getElementById("options-container");
        const labels = optionsContainer.getElementsByClassName("option-label");
        
        let allCorrect = true;
        let selectedCount = 0;

        // Evaluate each checkbox
        for (let label of labels) {
            const checkbox = label.querySelector("input");
            const isChecked = checkbox.checked;
            const isCorrectAnswer = q.correctAnswers.includes(checkbox.value);

            // Disable checkboxes after submission
            checkbox.disabled = true;

            if (isChecked) {
                selectedCount++;
                if (isCorrectAnswer) {
                    label.classList.add("correct"); // Right answer chosen
                } else {
                    label.classList.add("incorrect"); // Wrong answer chosen
                    allCorrect = false;
                }
            } else {
                if (isCorrectAnswer) {
                    label.classList.add("missed"); // Missed a right answer
                    allCorrect = false;
                }
            }
        }

        // Check if user selected nothing
        if (selectedCount === 0) {
            allCorrect = false;
        }

        // Provide Feedback
        const feedbackDiv = document.getElementById("feedback");
        if (allCorrect) {
            feedbackDiv.innerText = "Excellent! You identified all observations.";
            feedbackDiv.style.color = "#155724";
        } else {
            feedbackDiv.innerText = "Not quite. Check the highlighted answers to see what you missed.";
            feedbackDiv.style.color = "#721c24";
        }

        // Toggle buttons
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex >= reactions.length) {
            // Loop back to the start or show an end screen
            currentQuestionIndex = 0; 
            alert("You have completed all template reactions. Looping back to the start!");
        }
        loadQuestion();
    }

    // Initialize the first question on load
    window.onload = loadQuestion;

</script>

</body>
</html>
