<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Chemistry Observation Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            max-width: 680px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            font-size: 1.5em;
        }
        .reactants-box {
            background: #eef2f5;
            padding: 18px;
            border-left: 6px solid #3498db;
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 22px;
            border-radius: 4px;
            text-align: center;
        }
        .quiz-step {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .step-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sub-title {
            font-size: 0.85em;
            color: #7f8c8d;
            margin: 8px 0 4px 0;
            font-weight: bold;
        }
        .fork-options, .color-row, .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            background: #f9fbfd;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: #f1f5f9;
        }
        .option-label input {
            margin-right: 8px;
            transform: scale(1.1);
        }
        /* Dynamic Hide/Show Classes */
        .hidden {
            display: none !important;
        }
        .nested-block {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #e1e8ed;
        }
        /* Feedback State Styles */
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .missed {
            border: 2px dashed #28a745 !important;
            background-color: #f4fff6 !important;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }
        .btn {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Chemical Reaction Analyzer</h2>
    
    <div class="reactants-box" id="reactants-display">
        </div>
    
    <div class="quiz-step">
        <div class="step-title">Does a reaction occur?</div>
        <div class="fork-options">
            <label class="option-label"><input type="radio" name="reaction-presence" value="yes" onchange="toggleReactionFlow(this.value)">Have Reaction</label>
            <label class="option-label"><input type="radio" name="reaction-presence" value="no" onchange="toggleReactionFlow(this.value)">No Reaction</label>
        </div>
    </div>

    <div id="observations-main-panel" class="hidden">
        
        <div class="quiz-step">
            <div class="step-title">Part 1: Solution Colour Change</div>
            <div class="fork-options">
                <label class="option-label"><input type="radio" name="color-change-toggle" value="yes" onchange="toggleColorSelectors(this.value)">Yes, color changes</label>
                <label class="option-label"><input type="radio" name="color-change-toggle" value="no" onchange="toggleColorSelectors(this.value)">No solution color change</label>
            </div>

            <div id="color-details-grid" class="nested-block hidden">
                <div class="sub-title">Initial Colour (From):</div>
                <div class="color-row">
                    <label class="option-label"><input type="checkbox" name="color-from" value="Colorless">Colorless</label>
                    <label class="option-label"><input type="checkbox" name="color-from" value="Red">Red</label>
                    <label class="option-label"><input type="checkbox" name="color-from" value="Green">Green</label>
                    <label class="option-label"><input type="checkbox" name="color-from" value="Blue">Blue</label>
                    <label class="option-label"><input type="checkbox" name="color-from" value="Yellow">Yellow</label>
                    <label class="option-label"><input type="checkbox" name="color-from" value="White">White</label>
                    <label class="option-label"><input type="checkbox" name="color-from" value="Purple">Purple</label>
                </div>

                <div class="sub-title">Final Colour (To):</div>
                <div class="color-row">
                    <label class="option-label"><input type="checkbox" name="color-to" value="Colorless">Colorless</label>
                    <label class="option-label"><input type="checkbox" name="color-to" value="Red">Red</label>
                    <label class="option-label"><input type="checkbox" name="color-to" value="Green">Green</label>
                    <label class="option-label"><input type="checkbox" name="color-to" value="Blue">Blue</label>
                    <label class="option-label"><input type="checkbox" name="color-to" value="Yellow">Yellow</label>
                    <label class="option-label"><input type="checkbox" name="color-to" value="White">White</label>
                    <label class="option-label"><input type="checkbox" name="color-to" value="Purple">Purple</label>
                </div>
            </div>
        </div>

        <div class="quiz-step">
            <div class="step-title">Part 2: Other Observations</div>
            
            <div class="sub-title">Precipitate State:</div>
            <div class="options-grid">
                <label class="option-label"><input type="checkbox" name="obs-ppt" value="Solid dissolves">Solid dissolves</label>
                <label class="option-label"><input type="checkbox" name="obs-ppt" value="White precipitate forms">White precipitate forms</label>
                <label class="option-label"><input type="checkbox" name="obs-ppt" value="Yellow precipitate forms">Yellow precipitate forms</label>
                <label class="option-label"><input type="checkbox" name="obs-ppt" value="Brown precipitate forms">Brown precipitate forms</label>
                <label class="option-label"><input type="checkbox" name="obs-ppt" value="No precipitate change">No precipitate change</label>
            </div>

            <div class="sub-title">Gas / Smell Evolution:</div>
            <div class="options-grid" style="margin-top: 10px;">
                <label class="option-label"><input type="checkbox" name="obs-gas" value="Colorless gas bubbles">Colorless gas bubbles</label>
                <label class="option-label"><input type="checkbox" name="obs-gas" value="Brown gas evolved">Brown gas evolved</label>
                <label class="option-label"><input type="checkbox" name="obs-gas" value="Pungent smell">Pungent smell</label>
                <label class="option-label"><input type="checkbox" name="obs-gas" value="No gas or smell">No gas or smell</label>
            </div>
        </div>

    </div>

    <div class="controls">
        <button class="btn" id="submit-btn" onclick="checkAnswers()">Submit Answer</button>
        <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none;">Next System</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    // Clean Data Matrix matching your exact structural conditions
    const reactions = [
        {
            reactants: "CuCO<sub>3</sub>(s) + H<sub>2</sub>SO<sub>4</sub>(aq)",
            hasReaction: "yes",
            hasColorChange: "yes",
            colorFrom: "Colorless",
            colorTo: "Blue",
            ppt: ["Solid dissolves"],
            gas: ["Colorless gas bubbles"]
        },
        {
            reactants: "FeSO<sub>4</sub>(aq) + KMnO<sub>4</sub>(aq)/H<sup>+</sup>",
            hasReaction: "yes",
            hasColorChange: "yes",
            colorFrom: "Purple",
            colorTo: "Colorless",
            ppt: ["No precipitate change"],
            gas: ["No gas or smell"]
        },
        {
            reactants: "Cu(s) + HCl(aq)",
            hasReaction: "no", // Standard HKDSE Unreactive System
            hasColorChange: "no",
            colorFrom: "",
            colorTo: "",
            ppt: [],
            gas: []
        },
        {
            reactants: "Cu(s) + 14M HNO<sub>3</sub>(aq)",
            hasReaction: "yes",
            hasColorChange: "yes",
            colorFrom: "Colorless",
            colorTo: "Blue",
            ppt: ["Solid dissolves"],
            gas: ["Brown gas evolved", "Pungent smell"]
        },
        {
            reactants: "Na<sub>2</sub>S<sub>2</sub>O<sub>3</sub>(aq) + HCl(aq)",
            hasReaction: "yes",
            hasColorChange: "no",
            colorFrom: "",
            colorTo: "",
            ppt: ["Yellow precipitate forms"],
            gas: ["Pungent smell"]
        }
    ];

    let currentQuestionIndex = 0;

    // Trigger Flow 1: Toggle Observation Block Visibility
    function toggleReactionFlow(value) {
        const panel = document.getElementById("observations-main-panel");
        if (value === "yes") {
            panel.classList.remove("hidden");
        } else {
            panel.classList.add("hidden");
        }
    }

    // Trigger Flow 2: Toggle Color Grid Fields Visibility
    function toggleColorSelectors(value) {
        const colorDetails = document.getElementById("color-details-grid");
        if (value === "yes") {
            colorDetails.classList.remove("hidden");
        } else {
            colorDetails.classList.add("hidden");
        }
    }

    function loadQuestion() {
        document.getElementById("feedback").innerText = "";
        document.getElementById("submit-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        
        const q = reactions[currentQuestionIndex];
        document.getElementById("reactants-display").innerHTML = q.reactants;

        // Reset and clear all Form Elements & CSS Modifiers
        const allInputs = document.querySelectorAll(".quiz-container input");
        allInputs.forEach(input => {
            input.checked = false;
            input.disabled = false;
            input.parentElement.className = "option-label";
        });

        // Hide observation subpanels by default on new question reload
        document.getElementById("observations-main-panel").classList.add("hidden");
        document.getElementById("color-details-grid").classList.add("hidden");
    }

    // Standard Array/Value Evaluator Engine
    function evaluateGroup(inputs, correctValues) {
        let perfect = true;
        inputs.forEach(input => {
            const label = input.parentElement;
            const isChecked = input.checked;
            const isCorrect = correctValues.includes(input.value);
            input.disabled = true;

            if (isChecked) {
                if (isCorrect) {
                    label.classList.add("correct");
                } else {
                    label.classList.add("incorrect");
                    perfect = false;
                }
            } else {
                if (isCorrect) {
                    label.classList.add("missed");
                    perfect = false;
                }
            }
        });
        return perfect;
    }

    function checkAnswers() {
        const q = reactions[currentQuestionIndex];
        
        // Grab form selector control modules
        const presenceRadios = document.querySelectorAll("input[name='reaction-presence']");
        const colorToggleRadios = document.querySelectorAll("input[name='color-change-toggle']");
        const colorFromCBs = document.querySelectorAll("input[name='color-from']");
        const colorToCBs = document.querySelectorAll("input[name='color-to']");
        const pptCBs = document.querySelectorAll("input[name='obs-ppt']");
        const gasCBs = document.querySelectorAll("input[name='obs-gas']");

        // 1. Evaluate Reaction Presence Fork
        const presenceCorrect = evaluateGroup(presenceRadios, [q.hasReaction]);
        let observationsCorrect = true;

        // 2. Process observations conditionally if reaction occurs
        if (q.hasReaction === "yes") {
            const colorToggleCorrect = evaluateGroup(colorToggleRadios, [q.hasColorChange]);
            
            let colorDetailsCorrect = true;
            if (q.hasColorChange === "yes") {
                const fromCorrect = evaluateGroup(colorFromCBs, [q.colorFrom]);
                const toCorrect = evaluateGroup(colorToCBs, [q.colorTo]);
                colorDetailsCorrect = fromCorrect && toCorrect;
            } else {
                // If no color change expected, check if user selection was clean
                evaluateGroup(colorFromCBs, []);
                evaluateGroup(colorToCBs, []);
            }

            const pptCorrect = evaluateGroup(pptCBs, q.ppt);
            const gasCorrect = evaluateGroup(gasCBs, q.gas);

            observationsCorrect = colorToggleCorrect && colorDetailsCorrect && pptCorrect && gasCorrect;
        } else {
            // If No Reaction occurs, disable remaining untouched options clearly
            document.querySelectorAll("#observations-main-panel input").forEach(i => i.disabled = true);
        }

        // Finalize Scoring Assessment Output
        const feedbackDiv = document.getElementById("feedback");
        if (presenceCorrect && observationsCorrect) {
            feedbackDiv.innerText = "Excellent! Your prediction matrix is 100% correct.";
            feedbackDiv.style.color = "#155724";
        } else {
            feedbackDiv.innerText = "Incorrect tracking configuration. Analyze the missed properties.";
            feedbackDiv.style.color = "#721c24";
        }

        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex >= reactions.length) {
            currentQuestionIndex = 0; 
            alert("Quiz target pool completed. Restarting tracker!");
        }
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
